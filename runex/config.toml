version = 1

[keybind.trigger]
default = "space"
pwsh = "space"
bash = "space"
zsh = "space"
nu = "space"

[[abbr]]
key = "rx"
expand = "runex"
when_command_exists = ["runex"]

[[abbr]]
key = "ls"
expand = "lsd"
when_command_exists = ["lsd"]

[[abbr]]
key = "ll"
expand = "lsd -lF --group-dirs first"
when_command_exists = ["lsd"]

[[abbr]]
key = "ll."
expand = "lsd -laF --group-dirs first"
when_command_exists = ["lsd"]

[[abbr]]
key = "ls."
expand = "lsd -a"
when_command_exists = ["lsd"]

[[abbr]]
key = "l."
expand = "lsd -d .*"
when_command_exists = ["lsd"]

[[abbr]]
key = "rmf"
expand = "Remove-Item -Recurse -Force"
when_command_exists = ["Remove-Item"]

[[abbr]]
key = "cat"
expand = "bat"
when_command_exists = ["bat"]

[[abbr]]
key = "nv"
expand = "nvim"
when_command_exists = ["nvim"]

[[abbr]]
key = "lg"
expand = "lazygit"
when_command_exists = ["lazygit"]

[[abbr]]
key = "lzd"
expand = "lazydocker"
when_command_exists = ["lazydocker"]

[[abbr]]
key = "gg"
expand = "git-graph"
when_command_exists = ["git-graph"]

[[abbr]]
key = "zj"
expand = "zellij"
when_command_exists = ["zellij"]

[[abbr]]
key = "zed"
expand = "zeditor"
when_command_exists = ["zeditor"]

# dotfm shortcuts. `df` is intentionally not shadowed (POSIX disk-free).
[[abbr]]
key = "dfa"
expand = "dotfm apply"
when_command_exists = ["dotfm"]

[[abbr]]
key = "dfs"
expand = "dotfm status"
when_command_exists = ["dotfm"]

[[abbr]]
key = "dfd"
expand = "dotfm diff"
when_command_exists = ["dotfm"]

[[abbr]]
key = "dfl"
expand = "dotfm list"
when_command_exists = ["dotfm"]

[[abbr]]
key = "dfdr"
expand = "dotfm doctor"
when_command_exists = ["dotfm"]
