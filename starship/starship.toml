# ~/.config/starship.toml

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[ÔŞ£](bold green)' # The 'success_symbol' segment is being set to 'ÔŞ£' with the color 'bold green'

# The symbol to display when the last command failed
command_timeout = 5

# Disable the package module, hiding it from the prompt completely
[battery]
disabled = true

[directory]
#disabled = true
# Search for the root of the git repository
# This is often the most performance-impacting setting
truncate_to_repo = false
# Path truncation is disabled, showing only the last directory name.
truncation_length = 1
# Symbol used when truncating the path (e.g., .../src)
truncation_symbol = "ÔÇĞ/"
# Use logical path. It may be slightly faster as it does not resolve symbolic links.
use_logical_path = true
# This is the style for the directory module
style = "bold cyan"
read_only = " ¾░î¥"

